<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HBnB - Add Review</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body data-page="add-review">
	<header class="site-header">
		<div class="header-left">
			<a href="index.html" class="logo-link">
				<img src="images/logo.png" alt="HBnB logo" class="logo">
			</a>
		</div>

		<nav class="nav-bar">
			<a href="index.html">Home</a>
			<a href="login.html" id="login-link" class="login-button">Login</a>
			<button id="logout-button" class="login-button hidden" type="button">Logout</button>
		</nav>
	</header>

	<main class="container center-content">
		<section class="form-card">
			<div id="place-review-title" class="place-review-title"></div>

			<form id="review-form">
				<h2>Add a Review</h2>

				<div class="form-group">
					<label for="review">Your Review:</label>
					<textarea id="review" name="review" required></textarea>
				</div>

				<div class="form-group">
					<label for="rating">Rating:</label>
					<select id="rating" name="rating" required>
						<option value="">Choose a rating</option>
						<option value="1">1 - Very bad</option>
						<option value="2">2 - Bad</option>
						<option value="3">3 - Okay</option>
						<option value="4">4 - Good</option>
						<option value="5">5 - Excellent</option>
					</select>
				</div>

				<button type="submit" class="primary-button">Submit Review</button>
				<p id="review-message" class="success-message hidden"></p>
				<p id="review-error" class="error-message hidden"></p>
			</form>
		</section>
	</main>

	<footer class="site-footer">
		<p>All rights reserved.</p>
	</footer>

	<script src="scripts.js"></script>
</body>
</html>
