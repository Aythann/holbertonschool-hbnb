<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HBnB - Place Details</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body data-page="place">
	<header class="site-header">
		<div class="header-left">
			<a href="index.html" class="logo-link">
				<img src="images/logo.png" alt="HBnB logo" class="logo">
			</a>
		</div>

		<nav class="nav-bar">
			<a href="index.html">Home</a>
			<a href="login.html" id="login-link" class="login-button">Login</a>
			<button id="logout-button" class="login-button hidden" type="button">Logout</button>
		</nav>
	</header>

	<main class="container">
		<section id="message-box" class="message-box hidden"></section>

		<section id="place-details" class="place-details"></section>

		<section id="reviews" class="reviews-section">
			<h2>Reviews</h2>
			<div id="reviews-list"></div>
		</section>

		<section id="add-review" class="add-review hidden">
			<h2>Add a Review</h2>
			<p>
				<a id="add-review-link" class="primary-button inline-button" href="#">Write a review</a>
			</p>
		</section>
	</main>

	<footer class="site-footer">
		<p>All rights reserved.</p>
	</footer>

	<script src="scripts.js"></script>
</body>
</html>
