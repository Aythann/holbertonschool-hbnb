<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HBnB - Places</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body data-page="index">
	<header class="site-header">
		<div class="header-left">
			<a href="index.html" class="logo-link">
				<img src="images/logo.png" alt="HBnB logo" class="logo">
			</a>
		</div>

		<nav class="nav-bar">
			<a href="index.html">Home</a>
			<a href="login.html" id="login-link" class="login-button">Login</a>
			<button id="logout-button" class="login-button hidden" type="button">Logout</button>
		</nav>
	</header>

	<main class="container">
		<h1 class="page-title">Available Places</h1>

		<section id="filter" class="filter-section">
			<label for="price-filter">Max Price:</label>
			<select id="price-filter">
				<option value="all">All</option>
				<option value="10">10</option>
				<option value="50">50</option>
				<option value="100">100</option>
			</select>
		</section>

		<section id="message-box" class="message-box hidden"></section>

		<section id="places-list" class="places-grid"></section>
	</main>

	<footer class="site-footer">
		<p>All rights reserved.</p>
	</footer>

	<script src="scripts.js"></script>
</body>
</html>
